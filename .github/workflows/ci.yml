name: Fitness Tracker CI Pipeline

on:
push:
branches:
- master

pull_request:
branches:
- master

jobs:
build-and-scan:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 18

  - name: Install Dependencies
    run: npm install

  - name: SonarQube Scan
    uses: SonarSource/sonarqube-scan-action@master
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  - name: Build Docker Image
    run: docker build -t fitness-tracker:${{ github.sha }} .

  - name: Login to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  - name: Push Docker Image
    run: |
      docker tag fitness-tracker:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/fitness-tracker:latest
      docker push ${{ secrets.DOCKER_USERNAME }}/fitness-tracker:latest
```
