apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fitness-tracker
  template:
    metadata:
      labels:
        app: fitness-tracker
    spec:
      containers:
      - name: fitness-tracker
        image: angira9/fitness-tracker:v1
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        - name: HOST
          value: "0.0.0.0"
        - name: NODE_ENV
          value: "production"

---
apiVersion: v1
kind: Service
metadata:
  name: fitness-tracker-service
spec:
  selector:
    app: fitness-tracker
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  type: LoadBalancer
